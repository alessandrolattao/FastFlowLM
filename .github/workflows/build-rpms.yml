name: Build RPMs

on:
  push:
    branches: [main]
    paths:
      - 'xdna-driver/**'
      - 'fastflowlm/**'
      - 'Makefile'
  workflow_dispatch:

jobs:
  srpm:
    name: Generate SRPMs
    runs-on: ubuntu-latest
    container:
      image: fedora:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: dnf install -y make git python3 rpm-build

      - name: Build SRPMs
        run: make srpm-xdna srpm-flm

      - uses: actions/upload-artifact@v4
        with:
          name: srpms
          path: out/*.src.rpm

  copr:
    name: Submit to COPR
    needs: srpm
    runs-on: ubuntu-latest
    container:
      image: fedora:latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: srpms
          path: srpms/

      - name: Install copr-cli
        run: dnf install -y copr-cli

      - name: Configure copr-cli
        env:
          COPR_LOGIN: ${{ secrets.COPR_LOGIN }}
          COPR_TOKEN: ${{ secrets.COPR_TOKEN }}
        run: |
          mkdir -p ~/.config
          printf '[copr-cli]\nlogin = %s\nusername = alessandrolattao\ntoken = %s\ncopr_url = https://copr.fedorainfracloud.org\n' \
            "$COPR_LOGIN" "$COPR_TOKEN" > ~/.config/copr

      - name: Submit xdna-driver to COPR
        run: copr-cli build alessandrolattao/fastflowlm srpms/xdna-driver-*.src.rpm

      - name: Submit fastflowlm to COPR
        run: copr-cli build alessandrolattao/fastflowlm srpms/fastflowlm-*.src.rpm --nowait
