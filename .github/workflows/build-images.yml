name: Build and push Docker images

on:
  push:
    branches: [main]
    paths:
      - "docker/Dockerfile.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - file: docker/Dockerfile.fedora-42
            tag: fedora-42
          - file: docker/Dockerfile.fedora-43
            tag: fedora-43
          - file: docker/Dockerfile.fedora-44
            tag: fedora-44
          - file: docker/Dockerfile.fedora-rawhide
            tag: fedora-rawhide
          - file: docker/Dockerfile.epel-10
            tag: epel-10
          - file: docker/Dockerfile.opensuse-tumbleweed
            tag: opensuse-tumbleweed

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/fastflowlm-build:${{ matrix.tag }}
          DOCKERFILE: ${{ matrix.file }}
        run: |
          docker build -f "$DOCKERFILE" -t "$IMAGE" .
          docker push "$IMAGE"
