name: Build fastflowlm

on:
  push:
    branches: [main]
    paths:
      - 'fastflowlm/**'
      - 'Makefile'

jobs:
  srpm:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: dnf install -y make rpm-build copr-cli

      - name: Build SRPM
        run: make srpm-flm

      - name: Submit to COPR
        env:
          COPR_LOGIN: ${{ secrets.COPR_LOGIN }}
          COPR_TOKEN: ${{ secrets.COPR_TOKEN }}
        run: |
          mkdir -p ~/.config
          printf '[copr-cli]\nlogin = %s\nusername = alessandrolattao\ntoken = %s\ncopr_url = https://copr.fedorainfracloud.org\n' \
            "$COPR_LOGIN" "$COPR_TOKEN" > ~/.config/copr
          copr-cli build alessandrolattao/fastflowlm out/fastflowlm-*.src.rpm --nowait
